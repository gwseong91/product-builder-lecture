<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn" aria-label="Toggle theme">
                <span class="icon">🌙</span>
            </button>
        </div>
        <h1>로또 번호 추첨기</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn">번호 생성</button>
    </div>

    <div class="container contact-container">
        <h2>제휴 문의</h2>
        <form id="contact-form" action="https://formspree.io/f/mbdbqenv" method="POST">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" placeholder="홍길동" required>
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" rows="4" placeholder="제휴 관련 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의 보내기</button>
        </form>
        <p id="form-success" class="form-success" style="display:none;">✅ 문의가 접수되었습니다. 빠른 시일 내에 연락드리겠습니다.</p>
    </div>
    <script src="main.js"></script>
</body>
</html>
